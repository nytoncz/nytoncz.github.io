<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resetinx</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
}

.container {
  padding: 12px;
}

h1 {
  text-align: center;
  font-size: 18px;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

button, input[type="file"] {
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
}

button {
  background: #007BFF;
  color: white;
}

.delete-btn {
  background: #dc3545;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

td {
  border-bottom: 1px solid #ddd;
  padding: 8px;
}

tr {
  cursor: pointer;
}

.value-short {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}

.detail-row {
  background: #eef6ff;
}

textarea {
  width: 100%;
  min-height: 100px;
  border: none;
  border-radius: 8px;
  padding: 8px;
  resize: vertical;
  font-family: monospace;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">
  <div class="actions"><input type="file" id="fileInput" accept=".json"><button onclick="uploadLocalStorage()">📤 Import</button>
    <button onclick="downloadLocalStorage()">📥 Export</button>



  </div>

  <table id="storageTable">
    <tbody></tbody>
  </table>
</div>

<script>
function getFormattedDate() {
  const now = new Date();
  const pad = n => n.toString().padStart(2, '0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
}

function refreshTable() {
  const tbody = document.querySelector("#storageTable tbody");
  tbody.innerHTML = "";

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    const value = localStorage.getItem(key);
    addRow(key, value);
  }
}

function addRow(key = "", value = "") {
  const tbody = document.querySelector("#storageTable tbody");

  const row = document.createElement("tr");
  row.innerHTML = `
    <td><input value="${escapeHtml(key)}"></td>
    <td class="value-short">${escapeHtml(value)}</td>
    <td>
  <button class="delete-btn" 
        onclick="event.stopPropagation(); if(confirm('delete??')) deleteRow(this)">
    🗑
</button>
  </td>
  `;

  row.addEventListener("click", () => toggleDetail(row));

  // autosave key
  row.querySelector("input").addEventListener("blur", () => autoSave(row));

  tbody.appendChild(row);
}

function toggleDetail(row) {
  const next = row.nextElementSibling;

  // pokud už je detail otevřený → zavřít
  if (next && next.classList.contains("detail-row")) {
    next.remove();
    return;
  }

  const key = row.children[0].querySelector("input").value;
  const value = localStorage.getItem(key) || "";

  const detailRow = document.createElement("tr");
  detailRow.classList.add("detail-row");

  detailRow.innerHTML = `
    <td colspan="3">
      <textarea>${escapeHtml(value)}</textarea>
    </td>
  `;

  const textarea = detailRow.querySelector("textarea");

  textarea.addEventListener("blur", () => {
    localStorage.setItem(key, textarea.value);
    refreshTable();
  });

  row.parentNode.insertBefore(detailRow, row.nextSibling);
}

function autoSave(row) {
  const key = row.children[0].querySelector("input").value;
  const value = localStorage.getItem(key) || "";

  if (!key) return;
  localStorage.setItem(key, value);
}

function deleteRow(btn) {
  const row = btn.closest("tr");
  const key = row.children[0].querySelector("input").value;

  if (key) localStorage.removeItem(key);

  const next = row.nextElementSibling;
  if (next && next.classList.contains("detail-row")) {
    next.remove();
  }

  row.remove();
}

function downloadLocalStorage() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    data[key] = localStorage.getItem(key);
  }

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `localStorage_${getFormattedDate()}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

function uploadLocalStorage() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("select file");

  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      localStorage.clear();
      for (const key in data) {
        localStorage.setItem(key, data[key]);
      }
      refreshTable();
    } catch {
      alert("Chybný JSON");
    }
  };
  reader.readAsText(file);
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

refreshTable();
</script>

</body>
</html>
