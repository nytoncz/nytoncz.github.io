<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>:| themx</title>

<style>
:root {
    --topbar-h: 60px;
    font-family: Arial, sans-serif;
}

body {
    margin: 0;
    background: white;
    color: white;
}

.topbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: var(--topbar-h);
    background: #000;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 1000;
}

.topbar .center {
    display: flex;
    gap: 10px;
}

.menu {
    position: fixed;
    top: 0;
    right: -60%;
    width: 60%;
    height: 100%;
    background: #222;
    transition: 0.3s;
    z-index: 999;
}
.menu.open { right: 0; }

.list {
    margin-top: var(--topbar-h);
}

.theme {
    padding-bottom: 10px;
}

.preview {
    border-radius: 1px;
    overflow: hidden;
}

.nav { padding: 6px; font-size: 13px; }
.content { padding: 10px;         border-bottom:1px solid white;}

.card {
    padding: 10px;
    margin-bottom: 8px;
    font-size: 13px;

}

.btn {
    padding: 10px;
    text-align: center;
    border-radius: 2px;
    font-size: 13px;
    width: 25%;
}


.palette {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    box-shadow: 0 0 3px black, 0 0 3px black;
}

.color {
    padding: 8px 2px;
    font-size: 12px;
    text-align: center;
    cursor: pointer;
    color: white;
    text-shadow: 0 0 3px black, 0 0 6px black;
    border-bottom:1px solid white;

}


.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: black;
    padding: 10px;
    display: none;
}

.row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
}

.input {
    flex: 1;
    padding: 5px;
    border-radius: 2px;
    border: none;
    font-size: 12px;

</style>
</head>

<body>

<div class="topbar">
            <button onclick="setCategory('all')"><b>:| thmx</b></button>
    

    <div class="center">
    <button onclick="setCategory('light')">lights</button>
    <button onclick="setCategory('dark')">darks</button>
    <button onclick="setCategory('tinted')">tinteds</button>
        <button onclick="randomThemes()">??</button>

    </div>

    <button onclick="toggleMenu()">☰</button>
</div>

<div class="menu" id="menu">
    <h3>Kategorie</h3>


</div>

<div class="list" id="list"></div>
<div class="toast" id="toast">ctrl+c</div>

<script>
const roles = [
    "background","surface","primaryText",
    "secondaryText","accent","accentText","border"
];

let themes = [];

let currentCategory = "all";
let mode = "default"; 


/* DEFAULT */
const defaultThemes = [

  {name: "base-light",category:"light",
    background: "#e6e6e6",surface: "#ffffff",
    primaryText: "#000000",secondaryText: "#606060",
    accent: "#cccccc",border: "#a1a1a1"},

{name: "modern-grey",category:"light",
    background: "#F8F9FA",surface: "#FFFFFF",
    primaryText: "#212529",secondaryText: "#6C757D",
    accent: "#cccccc",border: "#a1a1a1"},
    
{name: "pass-x",category:"light",
    background: "#d1ccc0",surface: "#e2dfd8",
    primaryText: "#000000",secondaryText: "#6C757D",
    accent: "#d1ccc0",border: "#a1a1a1"},
    
{name: "sepia-light",category:"light",
    background: "#f2f0e4",surface: "#fcfbf4",

    accent: "#f2f0e4",border: "#fcf5e5"},
    
  {name: "sepia",category:"light",

    accent: "#e3d3b6",border: "#e3d3b6"},
    
{name: "sunny-cream",category:"light",
    background: "#FFF6E6",surface: "#FFFCF5",
    primaryText: "#453D32",secondaryText: "#8C7E69",
    accent: "#F2E3C9",border: "#EBD9B9"},
    
    
{name: "soft-apricot",category:"light",

    primaryText: "#43342E",secondaryText: "#8C7369",
    accent: "#FFD8B8",border: "#F0E0D4"}, 

{name: "soft-ice",category: "light",
background: "#F4F7F9",surface: "#FFFFFF",
  primaryText: "#2D3436",secondaryText: "#636E72",
  accent: "#D1DCE5",border: "#E1E8ED"},
  
{name: "arctic-ice",category:"light",
    background: "#E8F1F8",surface: "#F4F9FF",
    primaryText: "#1A2B3C",secondaryText: "#576A7E",
    accent: "#BDD3E6",border: "#A9C1D6"},
    

  {name: "cloud-blue",category:"light",
    background: "#E6EBFF",surface: "#F2F5FF",
    primaryText: "#2E3345",secondaryText: "#69718C",
    accent: "#D0D7F2",border: "#C5CDE0"},  
    
{name: "soft-rose",category:"light",
    background: "#FFE6E6",surface: "#FFF0F0",
    primaryText: "#4A3232",secondaryText: "#8C7171",
    accent: "#F5D1D1",border: "#EBCBCB"}, 
    

  {name: "mint-whisper",category:"light",
    background: "#F1FFE6",surface: "#F9FFF5",
    primaryText: "#354032",secondaryText: "#6E7D69",
    accent: "#D9EBD0",border: "#CFE0C5"},
    
{name: "midnightsky",category:"dark",
    background: "#0B1117",surface: "#161B22",
    primaryText: "#F0F6FC",secondaryText: "#8B949E",
    accent: "#1F2937",border: "#30363D"},

{name: "twilight-blue",category:"dark",
    background: "#1C252E",surface: "#2A3540",
    primaryText: "#F0F6FC",secondaryText: "#94A3B8",
    accent: "#334155",border: "#3E4C59"},    

{name: "burnt-amber",category:"dark",
    background: "#1A1412",surface: "#2D2420",
    primaryText: "#F2EBE9",secondaryText: "#A6938D",
    accent: "#4A3933",border: "#3D302B"},  
    
{name: "x-gray",category:"dark",
    background: "#212121",surface: "#2D2D2D",
    primaryText: "#E0E0E0",secondaryText: "#9E9E9E",
    accent: "#424242",border: "#333333"},    
    
    {name: "dark-mid",category: "dark",
  background: "#212529", surface: "#495057", 
  primaryText: "#8A9199", secondaryText: "#E0E2E5",
  accent: "#212529", border: "#7b838a"},

    
  {name: "dark-base",category:"dark",
    background: "#3D4142",surface: "#1e1e1e",
    primaryText: "#F5F5F5",secondaryText: "#adb5bd",
    accent: "#575B5D",border: "#333333"},    
    
{name: "dark-dark",category:"dark",
    background: "#181818",surface: "#212121",
    primaryText: "#FFFFFF",secondaryText: "#AAAAAA",
    accent: "#3D3D3D",border: "#505050"}
    

    
];
/* INIT */
function init() {
    loadByCategory();
}



function loadByCategory() {
    mode = "default";

    if (currentCategory === "all") {
        themes = defaultThemes.map(t => ({...t}));
    } else {
        themes = defaultThemes
            .filter(t => t.category === currentCategory)
            .map(t => ({...t}));
    }

    render();
}


function loadDefault() {
    showingUser = false;
    themes = defaultThemes.map(t => ({...t}));
    render();
}

function loadUser() {
    mode = "user";

    let saved = JSON.parse(localStorage.getItem("themes")) || [];

    if (currentCategory === "all") {
        themes = saved;
    } else {
        themes = saved.filter(t => t.category === currentCategory);
    }

    render();
}

/* TOGGLE */
function toggleUserSets() {
    showingUser ? loadDefault() : loadUser();
}

/* RANDOM = CELÁ NOVÁ SADA */
function randomThemes() {
    mode = "random";
    themes = [];

    for(let i=0;i<10;i++){
        let t = generateTheme();
        t.category = currentCategory;
        themes.push(t);
    }

    render();
}


function setCategory(cat) {
    currentCategory = cat;

    if (mode === "user") loadUser();
    else loadByCategory();
}



/* GENERATE THEME */
function generateTheme(){
    function r(){ return "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0"); }


return {
    name:"random",
    category: currentCategory,
    background:r(),
    surface:r(),
    primaryText:r(),
    secondaryText:r(),
    accent:r(),
    accentText:r(),
    border:r()
};

}

/* RENDER */
function render() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    themes.forEach(t => {

        const wrap = document.createElement("div");
        wrap.className = "theme";

        const p = document.createElement("div");
        p.className = "preview";
        p.style.background = t.background;

        const nav = document.createElement("div");
        nav.className = "nav";
        nav.style.color = t.primaryText;
        nav.innerText = t.name || "theme";

        const content = document.createElement("div");
        content.className = "content";

        const card = document.createElement("div");
card.className = "card";

card.style.background = t.surface;
card.style.border = "1px solid " + t.border;
card.style.color = t.primaryText; 
  
card.textContent = "Many types of grass grow at a steady and predictable pace depending on soil moisture and the intensity of sunlight."; 


        const sub = document.createElement("div");
        sub.style.color = t.secondaryText;
        sub.innerText = "Fruit on trees goes through natural phases during the season, from blossom to ripe fruit.";


const row = document.createElement("div");
row.className = "row";

const input = document.createElement("input");
input.className = "input";
input.placeholder = "Input...";
input.style.background = t.background;
input.style.color = t.primaryText;
input.style.border = "1px solid " + t.border;

const btn = document.createElement("div");
btn.className = "btn";
btn.style.background = t.accent;
btn.style.color = t.accentText;
btn.style.border = "1px solid " + t.border;
btn.innerText = "Button";

row.appendChild(input);
row.appendChild(btn);


card.appendChild(sub);
card.appendChild(row);

        content.appendChild(card);

        p.appendChild(nav);
        p.appendChild(content);

        const extra = generateExtraColors(t.accent);

        const palette = document.createElement("div");
        palette.className = "palette";

        const colors = [
            t.background,t.surface,t.primaryText,t.secondaryText,
            t.accent,t.border
        ];

        colors.forEach(c=>{
            const el = document.createElement("div");
            el.className="color";
            el.style.background=c;
            el.innerText=c;
            el.onclick=()=>copy(c);
            palette.appendChild(el);
        });

        wrap.appendChild(p);
        wrap.appendChild(palette);
        list.appendChild(wrap);
    });
}

/* COPY */
function copy(text) {
    navigator.clipboard.writeText(text);
    let t = document.getElementById("toast");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1000);
}

/* EXTRA COLORS */
function generateExtraColors(base) {
    let [h,s,l] = hexToHSL(base);
    return [
        hslToHex((h+10)%360,s,l),
        hslToHex((h-10+360)%360,s,l)
    ];
}

function hexToHSL(H) {
    let r=parseInt(H.substr(1,2),16)/255;
    let g=parseInt(H.substr(3,2),16)/255;
    let b=parseInt(H.substr(5,2),16)/255;

    let max=Math.max(r,g,b), min=Math.min(r,g,b);
    let h,s,l=(max+min)/2;

    if(max==min){h=s=0;}
    else{
        let d=max-min;
        s=l>0.5?d/(2-max-min):d/(max+min);
        switch(max){
            case r:h=(g-b)/d+(g<b?6:0);break;
            case g:h=(b-r)/d+2;break;
            case b:h=(r-g)/d+4;break;
        }
        h*=60;
    }
    return [h,s,l];
}

function hslToHex(h,s,l){
    let c=(1-Math.abs(2*l-1))*s;
    let x=c*(1-Math.abs((h/60)%2-1));
    let m=l-c/2;
    let r=0,g=0,b=0;

    if(h<60){r=c;g=x;}
    else if(h<120){r=x;g=c;}
    else if(h<180){g=c;b=x;}
    else if(h<240){g=x;b=c;}
    else if(h<300){r=x;b=c;}
    else{r=c;b=x;}

    r=Math.round((r+m)*255);
    g=Math.round((g+m)*255);
    b=Math.round((b+m)*255);

    return "#" + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* MENU */
function toggleMenu() {
    document.getElementById("menu").classList.toggle("open");
}

document.addEventListener("click", (e)=>{
    const menu=document.getElementById("menu");
    if(!menu.contains(e.target) && !e.target.closest(".topbar button")){
        menu.classList.remove("open");
    }
});

init();
</script>
