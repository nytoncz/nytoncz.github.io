<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notex</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #202020;
}

header {
  background: #222;
  color: white;
  padding: 12px;
  text-align: center;
}

#notes {
  padding-bottom: 120px;
}

/* NOTE */
.note {
  background: white;
  margin: 6px;
  border-radius: 6px;
  overflow: hidden;
}

.note-header {
  display: flex;
  padding: 10px;
  cursor: pointer;
  border-bottom: 1px solid #ddd;
}

.col1 { width: 25%; }
.col2 { width: 75%; font-size: 14px; }
.col3 { width: 70px; text-align: right; }

.title { font-weight: bold; }
.date { font-size: 11px; color: gray; }

.note-content {
  display: none;
  padding: 10px;
  white-space: pre-wrap;
}

.editor {
  display: none;
  padding: 10px;
}

input, textarea {
  width: 100%;
  padding: 6px;
  margin-bottom: 6px;
}

textarea { height: 120px; }

button {
  padding: 6px 8px;
  margin-left: 2px;
}

/* FLOATING BUTTON */
#addBtn {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 10vh;
  height: 10vh;
  border-radius: 50%;
  background: white;
  border: 2px solid black;
  font-size: 32px;
  font-weight: bold;
  color: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* COLOR PICKER */
.colorPicker {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}

.colorBox {
  width: 22px;
  height: 22px;
  border: 1px solid #333;
  cursor: pointer;
  border-radius: 4px;
}
</style>
</head>

<body>
<button id="addBtn">+</button>

<div id="notes"></div>

<script>
let notes = JSON.parse(localStorage.getItem("notes") || "[]");

const COLORS = [
  "#ffffff",
  "#fff3a0",
  "#a7f3d0",
  "#93c5fd",
  "#fca5a5",
  "#c4b5fd",
  "#d4d4d4"
];

function saveNotes() {
  localStorage.setItem("notes", JSON.stringify(notes));
}

function formatDate(ts) {
  return new Date(ts).toLocaleString();
}

function fileDate(ts) {
  return new Date(ts).toISOString().replace(/[:.]/g, "-");
}

function createId() {
  return Date.now() + Math.random();
}

function render() {
  const container = document.getElementById("notes");
  container.innerHTML = "";

  notes.sort((a, b) => b.created - a.created);

  notes.forEach(note => {
    const el = document.createElement("div");
    el.className = "note";

    const header = document.createElement("div");
    header.className = "note-header";
    header.style.background = note.color || "#ffffff";

    const col1 = document.createElement("div");
    col1.className = "col1";

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = note.title || "Bez názvu";

    const date = document.createElement("div");
    date.className = "date";
    date.textContent = formatDate(note.created);

    col1.appendChild(title);
    col1.appendChild(date);

    const col2 = document.createElement("div");
    col2.className = "col2";
    col2.textContent = (note.content || "").substring(0, 50);

    const col3 = document.createElement("div");
    col3.className = "col3";

    const copyBtn = document.createElement("button");
    copyBtn.textContent = "📋";

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏️";

    col3.appendChild(copyBtn);
    col3.appendChild(editBtn);

    header.appendChild(col1);
    header.appendChild(col2);
    header.appendChild(col3);

    const content = document.createElement("div");
    content.className = "note-content";
    content.textContent = note.content || "";

    const editor = document.createElement("div");
    editor.className = "editor";

    const titleInput = document.createElement("input");
    titleInput.value = note.title || "";

    const contentInput = document.createElement("textarea");
    contentInput.value = note.content || "";

    const colorPicker = document.createElement("div");
    colorPicker.className = "colorPicker";

    COLORS.forEach(c => {
      const box = document.createElement("div");
      box.className = "colorBox";
      box.style.background = c;

      box.onclick = () => {
        note.color = c;
        saveNotes();
        render();
      };

      colorPicker.appendChild(box);
    });

    const exportBtn = document.createElement("button");
    exportBtn.textContent = "Export TXT";

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Smazat";

    editor.appendChild(titleInput);
    editor.appendChild(contentInput);
    editor.appendChild(colorPicker);
    editor.appendChild(exportBtn);
    editor.appendChild(deleteBtn);

    header.onclick = () => {
      content.style.display = content.style.display === "block" ? "none" : "block";
    };

    editBtn.onclick = (e) => {
      e.stopPropagation();
      editor.style.display = editor.style.display === "block" ? "none" : "block";
    };

    copyBtn.onclick = (e) => {
      e.stopPropagation();
      navigator.clipboard.writeText(`${note.title || "Bez názvu"}\n${note.content || ""}`);
    };

    function autosave() {
      note.title = titleInput.value;
      note.content = contentInput.value;

      saveNotes();

      title.textContent = note.title || "Bez názvu";
      col2.textContent = (note.content || "").substring(0, 50);
    }

    titleInput.oninput = autosave;
    contentInput.oninput = autosave;

    exportBtn.onclick = () => {
      const filename = `${fileDate(Date.now())}-${(note.title || "poznamka").replace(/\s+/g, "_")}.txt`;

      const text =
`Název: ${note.title}
Vytvořeno: ${formatDate(note.created)}

${note.content}`;

      const blob = new Blob([text], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
    };

    deleteBtn.onclick = () => {
      if (confirm("Opravdu smazat?")) {
        notes = notes.filter(n => n.id !== note.id);
        saveNotes();
        render();
      }
    };

    el.appendChild(header);
    el.appendChild(content);
    el.appendChild(editor);

    container.appendChild(el);
  });
}

function addNote() {
  notes.push({
    id: createId(),
    title: "",
    content: "",
    created: Date.now(),
    color: "#ffffff"
  });

  saveNotes();
  render();
}

document.getElementById("addBtn").onclick = addNote;

render();
</script>

</body>
</html>
