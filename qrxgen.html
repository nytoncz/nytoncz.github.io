<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>qrxgen</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #202020;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 { font-size: 20px; text-align: center; }

    input, select, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: bold;
    }

    input, select { background: #445544; color: white;font-weight: bold; }

    button {
      background: #ced07d;
      font-weight: bold;
    }

    .output {
      background: #475f5f;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #qrcode { display: none; }
    svg { background: white; }
  </style>
</head>

<body>
<select id="type">
  <option value="qr">qr</option>
  <option value="ean">ean</option>
</select>

<input id="text" placeholder="text/number" />

<button onclick="generate()">generate</button>

<div class="output">
  <div id="qrcode"></div>
  <svg id="barcode"></svg>

  <button onclick="downloadPNG()">⬇️ download .png</button>
  <button onclick="downloadSVG()">⬇️ download .svg</button>
</div>

<script>
let lastType = "qr";

function sanitizeFilename(str) {
  return str.replace(/[^a-z0-9]/gi, "_").toLowerCase();
}

function generate() {
  const type = document.getElementById("type").value;
  const text = document.getElementById("text").value;

  lastType = type;

  document.getElementById("qrcode").innerHTML = "";
  document.getElementById("barcode").innerHTML = "";

  if (type === "qr") {
    document.getElementById("qrcode").style.display = "block";
    document.getElementById("barcode").style.display = "none";

    new QRCode(document.getElementById("qrcode"), {
      text: text,
      width: 220,
      height: 220
    });
  }

  if (type === "ean") {
    document.getElementById("qrcode").style.display = "none";
    document.getElementById("barcode").style.display = "block";

    let digits = text.replace(/\D/g, "");

    if (digits.length > 12) digits = digits.slice(0, 12);
    if (digits.length < 12) digits = digits.padEnd(12, "0");

    JsBarcode("#barcode", digits, {
      format: "ean13",
      lineColor: "#000",
      width: 2,
      height: 80,
      displayValue: true
    });
  }
}

/* ---------------- PNG EXPORT ---------------- */
function downloadPNG() {
  const text = document.getElementById("text").value || "code";
  const filename = sanitizeFilename((lastType === "qr" ? "qr-" : "ean-") + text);

  if (lastType === "qr") {
    const canvas = document.querySelector("#qrcode canvas");
    const img = document.querySelector("#qrcode img");

    let dataURL;

    if (canvas) {
      dataURL = canvas.toDataURL("image/png");
    } else if (img) {
      const c = document.createElement("canvas");
      c.width = img.width;
      c.height = img.height;
      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0);
      dataURL = c.toDataURL("image/png");
    }

    const a = document.createElement("a");
    a.href = dataURL;
    a.download = filename + ".png";
    a.click();
  }

  if (lastType === "ean") {
    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const img = new Image();
    const svgBlob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);

    img.onload = function () {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);

      const a = document.createElement("a");
      a.download = filename + ".png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    };

    img.src = url;
  }
}

/* ---------------- SVG EXPORT ---------------- */
function downloadSVG() {
  const text = document.getElementById("text").value || "code";
  const filename = sanitizeFilename((lastType === "qr" ? "qr-" : "ean-") + text);

  if (lastType === "ean") {
    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const blob = new Blob([svgData], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ".svg";
    a.click();

    URL.revokeObjectURL(url);
  }

  if (lastType === "qr") {
    const canvas = document.querySelector("#qrcode canvas");
    const img = document.querySelector("#qrcode img");

    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");

    let source = canvas || img;

    c.width = source.width;
    c.height = source.height;

    ctx.drawImage(source, 0, 0);

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="${c.width}" height="${c.height}">
        <image href="${c.toDataURL("image/png")}" width="${c.width}" height="${c.height}"/>
      </svg>
    `;

    const blob = new Blob([svg], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ".svg";
    a.click();
  }
}
</script>

</body>
</html>
