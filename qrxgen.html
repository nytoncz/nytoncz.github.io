<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>qrxgen</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>

  <style>
    html, body { overscroll-behavior: none; }
    body {
      font-family: Arial;
      margin: 0;
      padding: 16px;
      background: #202020;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, select, button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      font-weight: bold;
    }

    input, select { background: #576575; color: white; }

    button {
      background: #88af95;
    }

    .output {
      background: #576575;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #qrcode { display: none; }
    svg { background: white; }
  </style>
</head>

<body>

<select id="type">
  <option value="qr">qr</option>
  <option value="ean13">ean-13</option>
  <option value="ean8">ean-8</option>
</select>

<input id="text" placeholder="text/number" />

<button onclick="generate()">generate</button>

<div class="output">
  <div id="qrcode"></div>
  <svg id="barcode"></svg>

  <button onclick="downloadPNG()">-> download .png</button>
  <button onclick="downloadSVG()">-> download .svg</button>
</div>

<script>
let lastType = "qr";

function sanitizeFilename(str) {
  return str.replace(/[^a-z0-9]/gi, "_").toLowerCase();
}

function generate() {
  const type = document.getElementById("type").value;
  const text = document.getElementById("text").value;

  lastType = type;

  document.getElementById("qrcode").innerHTML = "";
  document.getElementById("barcode").innerHTML = "";

  if (type === "qr") {
    document.getElementById("qrcode").style.display = "block";
    document.getElementById("barcode").style.display = "none";

    new QRCode(document.getElementById("qrcode"), {
      text: text,
      width: 300,
      height: 300
    });
  }

  if (type === "ean13" || type === "ean8") {
    document.getElementById("qrcode").style.display = "none";
    document.getElementById("barcode").style.display = "block";

    let digits = text.replace(/\D/g, "");

    if (type === "ean13") {
      if (digits.length !== 12 && digits.length !== 13) {
        alert("format error");
        return;
      }
    }

    if (type === "ean8") {
      if (digits.length !== 7 && digits.length !== 8) {
        alert("format error");
        return;
      }
    }

    JsBarcode("#barcode", digits, {
      format: type,
      lineColor: "#000",
      width: 3,         // 🔥 vyšší kvalita
      height: 120,
      displayValue: true,
      margin: 10
    });
  }
}

/* ---------------- PNG EXPORT (HI-RES) ---------------- */
function downloadPNG() {
  const text = document.getElementById("text").value || "code";
  const filename = sanitizeFilename(lastType + "-" + text);

  if (lastType === "qr") {
    const canvas = document.querySelector("#qrcode canvas");
    const scale = 4;

    const hiCanvas = document.createElement("canvas");
    hiCanvas.width = canvas.width * scale;
    hiCanvas.height = canvas.height * scale;

    const ctx = hiCanvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(canvas, 0, 0, hiCanvas.width, hiCanvas.height);

    const a = document.createElement("a");
    a.href = hiCanvas.toDataURL("image/png");
    a.download = filename + ".png";
    a.click();
  }

  if (lastType === "ean13" || lastType === "ean8") {
    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const scale = 3;
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const img = new Image();
    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    img.onload = function () {
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      URL.revokeObjectURL(url);

      const a = document.createElement("a");
      a.download = filename + ".png";
      a.href = canvas.toDataURL("image/png");
      a.click();
    };

    img.src = url;
  }
}

/* ---------------- SVG EXPORT ---------------- */
function downloadSVG() {
  const text = document.getElementById("text").value || "code";
  const filename = sanitizeFilename(lastType + "-" + text);

  if (lastType === "ean13" || lastType === "ean8") {
    const svg = document.getElementById("barcode");
    const svgData = new XMLSerializer().serializeToString(svg);

    const blob = new Blob([svgData], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ".svg";
    a.click();

    URL.revokeObjectURL(url);
  }

  if (lastType === "qr") {
    const canvas = document.querySelector("#qrcode canvas");

    const svg = `
      <svg xmlns="http://www.w3.org/2000/svg" width="${canvas.width}" height="${canvas.height}">
        <image href="${canvas.toDataURL("image/png")}" width="100%" height="100%" style="image-rendering: pixelated;"/>
      </svg>
    `;

    const blob = new Blob([svg], { type: "image/svg+xml" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename + ".svg";
    a.click();
  }
}
</script>

</body>
</html>
