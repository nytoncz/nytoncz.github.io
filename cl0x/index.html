<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>hms</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.app {
  width: 100vmin;
  height: 100vmin;
  display: flex;
  justify-content: center;
  align-items: center;
}

.clock {
  width: 90%;
  height: 90%;
  border-radius: 50%;
  position: relative;
  background: white;
}

.clock::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 2vmin;
  height: 2vmin;
  background: black;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.number {
  position: absolute;
  width: 100%;
  height: 100%;
  text-align: center;
  transform: rotate(var(--rotation));
  color: black;
}

.number span {
  display: inline-block;
  transform: rotate(calc(-1 * var(--rotation)));
  font-size: 4vmin;
}

.number.major span {
  font-size: 8vmin;
}

.hand {
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: left center;
  transform: rotate(90deg);
  background: black;
}

.hour {
  width: 30%;
  height: 1vmin;
  margin-top: -0.5vmin;
}

.minute {
  width: 50%;
  height: 0.5vmin;
  margin-top: -0.35vmin;
}

.second {
  width: 50%;
  height: 0.3vmin;
  margin-top: -0.2vmin;
}
</style>
</head>

<body>

<div class="app">
  <div class="clock" id="clock">
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="hand second"></div>
  </div>
</div>

<script>

// ================= CLOCK =================
const clock = document.getElementById("clock");

for (let i = 1; i <= 12; i++) {
  const number = document.createElement("div");
  number.className = "number";

  if (i % 3 === 0) number.classList.add("major");

  number.style.setProperty("--rotation", i * 30 + "deg");

  const span = document.createElement("span");
  span.innerText = "•";
  number.appendChild(span);
  clock.appendChild(number);
}

function updateClock() {
  const now = new Date();

  const s = now.getSeconds();
  const m = now.getMinutes();
  const h = now.getHours();

  document.querySelector('.second').style.transform =
    `rotate(${s * 6 - 90}deg)`;

  document.querySelector('.minute').style.transform =
    `rotate(${m * 6 + s * 0.1 - 90}deg)`;

  document.querySelector('.hour').style.transform =
    `rotate(${h * 30 + m * 0.5 - 90}deg)`;
}

setInterval(updateClock, 1000);
updateClock();

// ================= AUDIO (WEB AUDIO API) =================
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const buffers = {};

// unlock audio
document.addEventListener("click", async () => {
  await audioCtx.resume();
}, { once: true });

// load sound buffer
async function loadSound(file) {
  const res = await fetch(file);
  const arr = await res.arrayBuffer();
  const buf = await audioCtx.decodeAudioData(arr);
  buffers[file] = buf;
}

function preloadSounds(files) {
  files.forEach(loadSound);
}

function playSound(file, time = 0) {
  const buffer = buffers[file];
  if (!buffer) return;

  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.connect(audioCtx.destination);

  source.start(audioCtx.currentTime + time);
}

// ================= SCHEDULE =================
let schedule = [];

function timeToMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

fetch('schedule.txt')
  .then(r => r.text())
  .then(text => {

    const lines = text.split('\n').filter(Boolean);

    schedule = lines.map(line => {
      const [time, soundsPart] = line.split(';');

      const sounds = soundsPart.split(',').map(s => {
        const [file, delay] = s.split('|');
        return {
          file: file.trim(),
          delay: Number(delay)
        };
      });

      return {
        time: time.trim(),
        t: timeToMin(time.trim()),
        sounds
      };
    });

    // preload
    const all = [];
    schedule.forEach(e => {
      e.sounds.forEach(s => {
        if (!all.includes(s.file)) all.push(s.file);
      });
    });

    preloadSounds(all);
  });

// ================= STABLE SCHEDULER =================
let firedMinute = null;

function getMinuteKey(date) {
  return date.getHours() + ":" + date.getMinutes();
}

setInterval(() => {
  const now = new Date();

  if (now.getSeconds() !== 0) return;

  const key = getMinuteKey(now);

  if (key === firedMinute) return;

  firedMinute = key;

  const currentMin = now.getHours() * 60 + now.getMinutes();

  schedule.forEach(event => {
    if (event.t === currentMin) {
      event.sounds.forEach(s => {
        playSound(s.file, s.delay / 1000);
      });
    }
  });

}, 1000);

</script>

</body>
</html>
