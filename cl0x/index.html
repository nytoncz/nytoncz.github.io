<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⌚cl0x</title>
  <!-- cl0x (opensource)   -->
  <!-- web miniapp cl0x for desktop. -->
  <!-- show time and play bells. -->

  <style>
    html,
body {
     overscroll-behavior: none;
     touch-action: manipulation;
     width: 100%;
     height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    position: fixed;
}
      * { box-sizing: border-box; }
      body {
      margin: 0;
      background: #2c2f33;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #2c2f33;
      overflow: hidden;
      font-family: Arial;
      }
      /* START SCREEN */
      #startScreen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.53);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3vmin;
      z-index: 999;
      cursor: pointer;
      }
      /* CLOCK */
      .app {
      width: 100vmin;
      height: 100vmin;
      display: flex;
      justify-content: center;
      align-items: center;
      }
      .clock {
      width: 90%;
      height: 90%;
      border-radius: 50%;
      background: #4a4d52;
      position: relative;
      }
      .clock::after {
      content: '';
      position: absolute;
      width: 2vmin;
      height: 2vmin;
      background: black;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #768490;;
      }
      /* DOTS */
      .number {
      position: absolute;
      width: 100%;
      height: 100%;
      text-align: center;
      transform: rotate(var(--rotation));
      }
      .number span {
      display: inline-block;
      transform: rotate(calc(-1 * var(--rotation)));
      font-size: 4vmin;
      }
      .number.major span {
      font-size: 8vmin;
      }
      /* HANDS */
      .hand {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: left center;
      background: black;
      }
      .hour { width: 30%; height: 2vmin; margin-top: -0.5vmin; border-radius:40%;background-color: #ADBAC7;}
      .minute { width: 50%; height: 1vmin; margin-top: -0.35vmin; border-radius:40%; background-color: #ADBAC7;}
      .second { width: 50%; height: 0.4vmin; margin-top: -0.2vmin; background-color: #768490;}
      
#volumeDisplay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  z-index: 9999;     
  
  color: white;
  font-size: 5vmin;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
  text-shadow: 0px 0px 10px rgba(0, 0, 0)
}
    </style>
  </head>
  <body>
    <div id="startScreen">
      <h1>enable cl0x</h1>
    </div>
    
<div id="volumeDisplay">vol:0.5</div>
    <div class="app">
      <div class="clock" id="clock">
        <div class="hand hour"></div>
        <div class="hand minute"></div>
        <div class="hand second"></div>
      </div>
    </div>
    <script>
    const clock = document.getElementById("clock");

      for (let i = 1; i <= 12; i++) {
        const n = document.createElement("div");
        n.className = "number";
      
        if (i % 3 === 0) n.classList.add("major");
      
        n.style.setProperty("--rotation", i * 30 + "deg");
      
        const span = document.createElement("span");
        span.innerText = "•";
        n.appendChild(span);
      
        clock.appendChild(n);
      }
      
      function updateClock() {
        const now = new Date();
      
        const s = now.getSeconds();
        const m = now.getMinutes();
        const h = now.getHours();
      
        document.querySelector(".second").style.transform =
          `rotate(${s * 6 - 90}deg)`;
      
        document.querySelector(".minute").style.transform =
          `rotate(${m * 6 + s * 0.1 - 90}deg)`;
      
        document.querySelector(".hour").style.transform =
          `rotate(${h * 30 + m * 0.5 - 90}deg)`;
      }
      
      setInterval(updateClock, 1000);
      updateClock();

      
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const buffers = {};
      let unlocked = false;
      
let masterVolume = 0.5;
const volumeDisplay = document.getElementById("volumeDisplay");
let volumeTimeout;

      async function warmup() {
        const b = audioCtx.createBuffer(1,1,22050);
        const s = audioCtx.createBufferSource();
        s.buffer = b;
        s.connect(audioCtx.destination);
        s.start();
      }
      
      async function unlockAudio() {
        if (unlocked) return;
      
        await audioCtx.resume();
        await warmup();
      
        unlocked = true;
        document.getElementById("startScreen").style.display = "none";
      
        startScheduler();
      }
      
      document.addEventListener("pointerdown", unlockAudio);
      document.addEventListener("keydown", unlockAudio);
      
      async function loadSound(file) {
        const r = await fetch(file);
        const a = await r.arrayBuffer();
        buffers[file] = await audioCtx.decodeAudioData(a);
      }
      
      function preload(files) {
        files.forEach(loadSound);
      }
      

function play(file, offset = 0, volume = 1) {
  const buf = buffers[file];
  if (!buf) return;

  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  const gainNode = audioCtx.createGain();
  gainNode.gain.value = masterVolume * volume;

  src.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  src.start(audioCtx.currentTime + offset);
}


function changeVolume(delta) {
  masterVolume = Math.min(1, Math.max(0, masterVolume + delta));

  masterVolume = Math.round(masterVolume * 10) / 10;

  volumeDisplay.innerText = "vol:" + masterVolume.toFixed(1);
  volumeDisplay.style.opacity = 1;

  clearTimeout(volumeTimeout);
  volumeTimeout = setTimeout(() => {
    volumeDisplay.style.opacity = 0;
  }, 1000);

  const firstSound = Object.keys(buffers)[0];
  if (firstSound) {
    play(firstSound, 0);
  }
}

clock.addEventListener("click", (e) => {
  const rect = clock.getBoundingClientRect();
  const x = e.clientX - rect.left;

  if (x < rect.width / 2) {
    changeVolume(-0.1); 
  } else {
    changeVolume(0.1); 
  }
});
      
      let schedule = [];
      
      function toMin(t){
        const [h,m] = t.split(":").map(Number);
        return h*60+m;
      }
      
      fetch("schedule.txt")
        .then(r=>r.text())
        .then(t=>{
      
          const lines = t.split("\n").filter(Boolean);
      
          schedule = lines.map(l=>{
            const [time, sounds] = l.split(";");
      
            return {
              t: toMin(time),
              sounds: sounds.split(",").map(s=>{
                const [f,d] = s.split("|");
                return { file:f.trim(), delay:+d };
              })
            };
          });
      
          const all=[];
          schedule.forEach(e=>{
            e.sounds.forEach(s=>{
              if(!all.includes(s.file)) all.push(s.file);
            });
          });
      
          preload(all);
        });
      
      let fired = -1;
      
      function startScheduler(){
      
        setInterval(()=>{
      
          const now = new Date();
      
          if(now.getSeconds() !== 0) return;
      
          const min = now.getHours()*60 + now.getMinutes();
      
          if(min === fired) return;
          fired = min;
      
          schedule.forEach(e=>{
            if(e.t === min){
              e.sounds.forEach(s=>{
                play(s.file, s.delay/1000);
              });
            }
          });
      
        }, 1000);
      }
      
    </script>
  </body>
</html>
